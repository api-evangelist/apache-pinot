aid: apache-pinot
name: Apache Pinot
description: >-
  Apache Pinot is a real-time distributed OLAP datastore designed to deliver scalable real-time analytics with low latency. It ingests data from batch and streaming sources and provides fast analytical
  queries for user-facing applications.
type: Index
position: Consumer
access: 3rd-Party
