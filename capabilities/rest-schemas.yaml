naftiko: 1.0.0-alpha2
info:
  label: Apache Pinot REST API — Schemas
  description: 'Apache Pinot REST API — Schemas. 4 operations. Lead operation: Apache Pinot List Schemas. Self-contained Naftiko
    capability covering one Apache Pinot business surface.'
  tags:
  - Apache Pinot
  - Schemas
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_PINOT_API_KEY: APACHE_PINOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-schemas
    baseUri: https://{host}
    description: Apache Pinot REST API — Schemas business capability. Self-contained, no shared references.
    resources:
    - name: schemas
      path: /schemas
      operations:
      - name: listschemas
        method: GET
        description: Apache Pinot List Schemas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addschema
        method: POST
        description: Apache Pinot Add Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: schemas-schemaName
      path: /schemas/{schemaName}
      operations:
      - name: getschema
        method: GET
        description: Apache Pinot Get Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: schemaName
          in: path
          type: string
          description: Schema name
          required: true
      - name: deleteschema
        method: DELETE
        description: Apache Pinot Delete Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: schemaName
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: rest-schemas-rest
    port: 8080
    description: REST adapter for Apache Pinot REST API — Schemas. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/schemas
      name: schemas
      description: REST surface for schemas.
      operations:
      - method: GET
        name: listschemas
        description: Apache Pinot List Schemas
        call: rest-schemas.listschemas
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addschema
        description: Apache Pinot Add Schema
        call: rest-schemas.addschema
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/schemas/{schemaname}
      name: schemas-schemaname
      description: REST surface for schemas-schemaName.
      operations:
      - method: GET
        name: getschema
        description: Apache Pinot Get Schema
        call: rest-schemas.getschema
        with:
          schemaName: rest.schemaName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteschema
        description: Apache Pinot Delete Schema
        call: rest-schemas.deleteschema
        with:
          schemaName: rest.schemaName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-schemas-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Pinot REST API — Schemas. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apache-pinot-list-schemas
      description: Apache Pinot List Schemas
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-schemas.listschemas
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-add-schema
      description: Apache Pinot Add Schema
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-schemas.addschema
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-get-schema
      description: Apache Pinot Get Schema
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-schemas.getschema
      with:
        schemaName: tools.schemaName
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-delete-schema
      description: Apache Pinot Delete Schema
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-schemas.deleteschema
      with:
        schemaName: tools.schemaName
      outputParameters:
      - type: object
        mapping: $.
