naftiko: 1.0.0-alpha2
info:
  label: Apache Pinot REST API — Tables
  description: 'Apache Pinot REST API — Tables. 4 operations. Lead operation: Apache Pinot List Tables. Self-contained Naftiko
    capability covering one Apache Pinot business surface.'
  tags:
  - Apache Pinot
  - Tables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_PINOT_API_KEY: APACHE_PINOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-tables
    baseUri: https://{host}
    description: Apache Pinot REST API — Tables business capability. Self-contained, no shared references.
    resources:
    - name: tables
      path: /tables
      operations:
      - name: listtables
        method: GET
        description: Apache Pinot List Tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtable
        method: POST
        description: Apache Pinot Create Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tables-tableName
      path: /tables/{tableName}
      operations:
      - name: gettable
        method: GET
        description: Apache Pinot Get Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletetable
        method: DELETE
        description: Apache Pinot Delete Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rest-tables-rest
    port: 8080
    description: REST adapter for Apache Pinot REST API — Tables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tables
      name: tables
      description: REST surface for tables.
      operations:
      - method: GET
        name: listtables
        description: Apache Pinot List Tables
        call: rest-tables.listtables
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtable
        description: Apache Pinot Create Table
        call: rest-tables.createtable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tables/{tablename}
      name: tables-tablename
      description: REST surface for tables-tableName.
      operations:
      - method: GET
        name: gettable
        description: Apache Pinot Get Table
        call: rest-tables.gettable
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetable
        description: Apache Pinot Delete Table
        call: rest-tables.deletetable
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-tables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Pinot REST API — Tables. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apache-pinot-list-tables
      description: Apache Pinot List Tables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-tables.listtables
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-create-table
      description: Apache Pinot Create Table
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-tables.createtable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-get-table
      description: Apache Pinot Get Table
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-tables.gettable
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-pinot-delete-table
      description: Apache Pinot Delete Table
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-tables.deletetable
      outputParameters:
      - type: object
        mapping: $.
